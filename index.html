<!DOCTYPE html>
<html>
<head>
    <title>Retail Sales Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">

        <h1>Retail Sales Prediction</h1>

        <form action="/predict" method="POST">

            <label>TV Advertisement Budget</label><br>
            <input type="text" name="tv" required><br><br>

            <label>Radio Advertisement Budget</label><br>
            <input type="text" name="radio" required><br><br>

            <label>Newspaper Advertisement Budget</label><br>
            <input type="text" name="newspaper" required><br><br>

            <button type="submit">Predict Sales</button>

        </form>

        <br>
        <h2>{{ prediction_text }}</h2>

    </div>

</body>
</html>
